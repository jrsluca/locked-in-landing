<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stay Locked In.</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      background: #000000;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* ── Background canvas (particles) ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Drifting orbs ── */
    .orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0;
      animation: orbFloat linear infinite;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(60, 60, 80, 0.2) 0%, transparent 70%);
      top: -150px;
      left: -150px;
      animation-duration: 30s;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(50, 50, 70, 0.18) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      animation-duration: 36s;
      animation-delay: -12s;
    }

    .orb-3 {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(70, 70, 100, 0.14) 0%, transparent 70%);
      top: 35%;
      left: 55%;
      animation-duration: 24s;
      animation-delay: -6s;
    }

    @keyframes orbFloat {
      0%   { opacity: 0; transform: translate(0px, 0px) scale(1); }
      10%  { opacity: 1; }
      50%  { transform: translate(70px, 50px) scale(1.1); }
      90%  { opacity: 1; }
      100% { opacity: 0; transform: translate(0px, 0px) scale(1); }
    }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 36px;
      z-index: 100;
    }

    .logo {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: rgba(255, 255, 255, 0.7);
    }

    .btn-waitlist {
      background: #ffffff;
      color: #000000;
      border: none;
      border-radius: 999px;
      padding: 11px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.2s;
      text-decoration: none;
    }

    .btn-waitlist:hover {
      background: #e0e0e0;
    }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 48px;
      position: relative;
    }

    /* centre glow */
    .hero::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -58%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(70, 70, 90, 0.25) 0%, transparent 65%);
      pointer-events: none;
      border-radius: 50%;
    }

    nav, .hero > * {
      position: relative;
      z-index: 2;
    }

    /* ── App icon ── */
    .app-icon {
      width: 120px;
      height: 120px;
      background: linear-gradient(160deg, #2a2a30 0%, #181819 60%, #0f0f10 100%);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 44px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 12px 40px rgba(0,0,0,0.7),
        0 3px 10px rgba(0,0,0,0.5);
    }

    .app-icon svg {
      width: 68px;
      height: 36px;
    }

    /* ── Headline ── */
    h1 {
      font-size: clamp(56px, 9vw, 116px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #ffffff;
      margin-bottom: 24px;
    }

    /* ── Subheadline ── */
    .sub {
      font-size: clamp(15px, 1.6vw, 18px);
      font-weight: 400;
      color: rgba(255, 255, 255, 0.42);
      letter-spacing: 0.005em;
      line-height: 1.5;
      margin-bottom: 48px;
      max-width: 460px;
    }

    /* ── CTA buttons ── */
    .cta-group {
      display: flex;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-primary {
      background: #ffffff;
      color: #000000;
      border: none;
      border-radius: 999px;
      padding: 18px 38px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
    }

    .btn-primary:hover {
      background: #e8e8e8;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 18px 38px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      text-decoration: none;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.35);
      transform: translateY(-1px);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      nav { padding: 18px 20px; }

      .app-icon {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        margin-bottom: 32px;
      }

      .app-icon svg { width: 54px; height: 28px; }

      .cta-group { flex-direction: column; gap: 12px; }

      .btn-primary,
      .btn-secondary { width: 270px; text-align: center; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <nav>
    <span class="logo">LockedIn</span>
    <a href="waitlist.html" class="btn-waitlist">Join Waitlist</a>
  </nav>

  <main class="hero">

    <div class="app-icon">
      <svg viewBox="0 0 68 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 2 L28 11 L28 25 L2 21 Z" fill="white" opacity="0.95"/>
        <path d="M66 2 L40 11 L40 25 L66 21 Z" fill="white" opacity="0.95"/>
        <ellipse cx="17" cy="17" rx="5.5" ry="6.5" fill="#141416"/>
        <ellipse cx="51" cy="17" rx="5.5" ry="6.5" fill="#141416"/>
      </svg>
    </div>

    <h1>Stay Locked In.</h1>

    <p class="sub">Build discipline. Destroy addictions. Transform your body and mind.</p>

    <div class="cta-group">
      <a href="waitlist.html" class="btn-primary">Get Early Access</a>
      <a href="waitlist.html" class="btn-secondary">Learn More</a>
    </div>

  </main>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let W, H, particles;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function createParticles() {
      particles = Array.from({ length: 80 }, () => ({
        x:  Math.random() * W,
        y:  Math.random() * H,
        r:  Math.random() * 1.1 + 0.3,
        vx: (Math.random() - 0.5) * 0.22,
        vy: (Math.random() - 0.5) * 0.22,
        o:  Math.random() * 0.3 + 0.04,
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (const p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(210, 210, 230, ${p.o})`;
        ctx.fill();
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < -2)  p.x = W + 2;
        if (p.x > W+2) p.x = -2;
        if (p.y < -2)  p.y = H + 2;
        if (p.y > H+2) p.y = -2;
      }
      requestAnimationFrame(draw);
    }

    resize();
    createParticles();
    draw();
    window.addEventListener('resize', () => { resize(); createParticles(); });
  </script>

</body>
</html>
